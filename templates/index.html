    <style>
        body {
            background-color: #0c0e12;
            color: #e2e2e8;
            overflow-x: hidden;
        }

        .pitch-texture {
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 229, 57, 0.05) 0%, transparent 80%);
        }

        .pitch-grid {
            background-image: 
                linear-gradient(rgba(59, 75, 55, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 75, 55, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .glass-card, .glass-panel {
            background: rgba(18, 20, 29, 0.7);
            backdrop-filter: blur(12px);

        }

        .glow-green {
            box-shadow: 0 0 15px rgba(0, 230, 57, 0.4);

            border: 0.5px solid rgba(0, 230, 57, 0.4);
        }

            box-shadow: 0 0 40px rgba(233, 196, 0, 0.3), inset 0 0 20px rgba(233, 196, 0, 0.1);
            border: 1px solid rgba(233, 196, 0, 0.4);
        }

        .segmented-bar {
            background: repeating-linear-gradient(90deg, #00e639, #00e639 8px, transparent 8px, transparent 10px);
        }

        .tilted-header {
            clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%);
        }

        .hero-gradient {
            background: linear-gradient(180deg, rgba(12, 14, 18, 0) 0%, rgba(12, 14, 18, 1) 100%);
        }

        .hud-scanline {
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, #00e639, transparent);
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.2;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(0); }
            100% { transform: translateY(100%); }
        }

        @keyframes pulse-green {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .live-dot {
            animation: pulse-green 2s infinite;
        }

        .tooltip-box {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;

        }

            transition: all 0.3s ease;

            transform: scale(1.05);

<body class="font-body-md selection:bg-primary-fixed-dim selection:text-on-primary">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

                    { home: "BRA", away: "KOR", home_goals: 4, away_goals: 1, winner: "BRA", probH: 71, probA: 29 },
                    { home: "NED", away: "USA", home_goals: 3, away_goals: 1, winner: "NED", probH: 59, probA: 41 },

                ],

                    { home: "FRA", away: "BRA", home_goals: 2, away_goals: 1, winner: "FRA", probH: 54, probA: 46 },
                    { home: "NED", away: "MAR", home_goals: 2, away_goals: 0, winner: "NED", probH: 68, probA: 32 }
                ],
                semis: [
                    { home: "FRA", away: "NED", home_goals: 3, away_goals: 2, winner: "FRA", probH: 58, probA: 42 }
                ],

                champion: "FRA",
                reliability: "HIGH",
                reliability_desc: "Variance within 2.1% across 10,000 iterations. Model trained on latest Opta player performance data.",
                trends: "MAR (12%)",
                trends_desc: "Morocco shows highest outlier potential. Probability of reaching Semi-Final increased by 4.2% since yesterday.",
                match: "FRA vs BRA (QEF)",
                match_desc: "Coin-flip scenario detected. Highest xG volatility score: 8.9. Critical tactical mismatch in midfield."
            },
            insights: {
                logloss: 0.642,
                auc: 0.789,
                importance: [
                    { feature: "SQUAD MARKET VALUE", importance: 34.2 },
                    { feature: "RECENT FORM (L5)", importance: 28.5 },
                    { feature: "HEAD-TO-HEAD (H2H)", importance: 15.8 },
                    { feature: "TRAVEL DISTANCE / FATIGUE", importance: 12.1 },
                    { feature: "WEATHER IMPACT", importance: 9.4 }
                ]
            }
        };

        // ISO Flagcdn Country mapping
        const COUNTRY_CODES = {
            "Qatar": "qa", "Ecuador": "ec", "Senegal": "sn", "Netherlands": "nl",
            "England": "gb-eng", "Iran": "ir", "United States": "us", "Wales": "gb-wls",
            "Argentina": "ar", "Saudi Arabia": "sa", "Mexico": "mx", "Poland": "pl",
            "France": "fr", "Australia": "au", "Denmark": "dk", "Tunisia": "tn",
            "Spain": "es", "Costa Rica": "cr", "Germany": "de", "Japan": "jp",
            "Belgium": "be", "Canada": "ca", "Morocco": "ma", "Croatia": "hr",
            "Brazil": "br", "Serbia": "rs", "Switzerland": "ch", "Cameroon": "cm",
            "Portugal": "pt", "Ghana": "gh", "Uruguay": "uy", "South Korea": "kr",
            "FRA": "fr", "POL": "pl", "BRA": "br", "KOR": "kr", "NED": "nl", "USA": "us",
            "ESP": "es", "MAR": "ma", "ARG": "ar"
        };

        const getFlagUrl = (team) => {
            const code = COUNTRY_CODES[team];
            if (code) {
                if (code.startsWith("gb-")) {
                    return `https://flagcdn.com/80x60/${code}.png`;
                }
                return `https://flagcdn.com/w80/${code}.png`;
            }
            return "https://flagcdn.com/w80/un.png"; // UN flag as default fallback
        };

        function App() {
            const [activeTab, setActiveTab] = useState("Dashboard");
            const [dataSource, setDataSource] = useState("Demo"); // "Demo" or "Real"

            // API State Variables
            const [teams, setTeams] = useState([]);
            const [profiles, setProfiles] = useState({});
            const [champProbs, setChampProbs] = useState([]);
            const [loadingSim, setLoadingSim] = useState(true);

            // Simulation tab states
            const [simRuns, setSimRuns] = useState(1000);
            const [simulationResult, setSimulationResult] = useState(null);
            const [loadingFullSim, setLoadingFullSim] = useState(false);

            // Predictor states
            const [homeTeam, setHomeTeam] = useState("Argentina");
            const [awayTeam, setAwayTeam] = useState("France");
            const [searchH, setSearchH] = useState("");
            const [searchA, setSearchA] = useState("");
            const [showDropH, setShowDropH] = useState(false);
            const [showDropA, setShowDropA] = useState(false);
            const [predictResult, setPredictResult] = useState(null);
            const [loadingPredict, setLoadingPredict] = useState(false);

            // Insights states
            const [insights, setInsights] = useState(null);
            const [loadingInsights, setLoadingInsights] = useState(true);

            // Load ELO comparisons and dynamic models on initialization
            useEffect(() => {
                fetch("/api/teams")
                    .then(res => res.json())
                    .then(data => {
                        setProfiles(data.profiles);
                        const list = [];
                        Object.values(data.groups).forEach(g => list.push(...g));
                        setTeams(list);
                    })
                    .catch(err => console.error("Failed to load teams profiles", err));

                fetch("/api/insights")
                    .then(res => res.json())
                    .then(data => {
                        setInsights(data);
                        setLoadingInsights(false);
                    })
                    .catch(err => console.error("Failed to load insights", err));

                // Fetch initial simulation
                fetch("/api/simulate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ runs: 100 })
                })
                .then(res => res.json())
                .then(data => {
                    setChampProbs(data.probs);
                    setSimulationResult(data);
                    setLoadingSim(false);
                })
                .catch(err => console.error("Failed to run initial simulation", err));
            }, []);

            // Predict effect for Real mode
            useEffect(() => {
                if (dataSource === "Real" && homeTeam && awayTeam && homeTeam !== awayTeam) {
                    setLoadingPredict(true);
                    fetch(`/api/predict?home_team=${homeTeam}&away_team=${awayTeam}`)
                        .then(res => res.json())
                        .then(data => {
                            setPredictResult(data);
                            setLoadingPredict(false);
                        })
                        .catch(err => {
                            console.error("Prediction failed", err);
                            setLoadingPredict(false);
                        });
                }
            }, [homeTeam, awayTeam, dataSource]);

            // Run Monte Carlo simulation for Simulator tab
            const triggerFullSimulation = (runsCount) => {
                setLoadingFullSim(true);
                fetch("/api/simulate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ runs: runsCount })
                })
                .then(res => res.json())
                .then(data => {
                    setSimulationResult(data);
                    if (activeTab === "Dashboard") {
                        setChampProbs(data.probs);
                    }
                    setLoadingFullSim(false);
                })
                .catch(err => {
                    console.error("Full simulation failed", err);
                    setLoadingFullSim(false);
                });
            };

            // Glass card mouse move glow effect listener
            useEffect(() => {
                const handleMouseMove = (e) => {
                    const cards = document.querySelectorAll('.glass-card, .glass-panel');
                    cards.forEach(card => {
                        const rect = card.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        card.style.setProperty('--mouse-x', `${x}px`);
                        card.style.setProperty('--mouse-y', `${y}px`);
                        
                        // Apply subtle dynamic gradient relative to cursor position
                        if (x >= 0 && y >= 0 && x <= rect.width && y <= rect.height) {
                            card.style.background = `radial-gradient(circle 80px at ${x}px ${y}px, rgba(0, 230, 57, 0.06) 0%, rgba(18, 20, 29, 0.7) 100%)`;
                        } else {
                            card.style.background = `rgba(18, 20, 29, 0.7)`;
                        }
                    });
                };
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, [activeTab]);

            return (
                <div className="min-h-screen relative pb-24 selection:bg-primary-fixed-dim selection:text-background">
                    {/* Top AppBar */}
                    <nav className="fixed top-0 w-full z-50 flex justify-between items-center px-margin h-20 max-w-[1280px] left-1/2 -translate-x-1/2 bg-surface/80 backdrop-blur-xl border-b border-white/10 shadow-[0_8px_24px_rgba(0,255,65,0.15)]">
                        <div className="flex items-center gap-8">
                            <span 
                                onClick={() => setActiveTab("Dashboard")}
                                className="font-display-md text-display-md font-bold italic tracking-tighter text-primary-fixed-dim cursor-pointer active:scale-95 transition-transform"
                            >
                                GOLDEN BOOT
                            </span>
                            <div className="hidden md:flex gap-6">
                                {["Dashboard", "Predictor", "Simulator", "Insights"].map(tab => (
                                    <button 
                                        key={tab} 
                                        id={`nav-tab-${tab.toLowerCase()}`}
                                        onClick={() => setActiveTab(tab)}
                                        className={`font-headline-sm text-headline-sm tracking-tight transition-all duration-300 ${activeTab === tab ? "text-primary font-bold border-b-2 border-primary pb-1" : "text-on-surface-variant font-medium hover:text-primary-fixed-dim"}`}
                                    >
                                        {tab}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Interactive Data Source Toggle */}
                        <div className="flex items-center gap-4">
                            <div className="flex items-center bg-surface-container-high border border-outline-variant rounded-full p-1 gap-1">
                                <button 
                                    id="data-source-toggle-demo"
                                    onClick={() => setDataSource("Demo")}
                                    className={`px-3 py-1 text-[10px] font-label-caps tracking-wider rounded-full transition-all duration-200 ${dataSource === "Demo" ? "bg-primary-container/20 text-primary-fixed-dim font-bold glow-green" : "text-on-surface-variant hover:text-white"}`}
                                >
                                    STITCH DEMO
                                </button>
                                <button 
                                    id="data-source-toggle-real"
                                    onClick={() => setDataSource("Real")}
                                    className={`px-3 py-1 text-[10px] font-label-caps tracking-wider rounded-full transition-all duration-200 flex items-center gap-1.5 ${dataSource === "Real" ? "bg-primary-fixed-dim text-background font-bold" : "text-on-surface-variant hover:text-white"}`}
                                >
                                    <span className={`w-1.5 h-1.5 rounded-full ${dataSource === "Real" ? "bg-background" : "bg-primary-fixed-dim"} live-dot`}></span>
                                    REAL MODEL
                                </button>
                            </div>
                            <button className="material-symbols-outlined text-on-surface-variant hover:text-primary transition-all">account_circle</button>
                            <button className="material-symbols-outlined text-on-surface-variant hover:text-primary transition-all">settings</button>
                        </div>
                    </nav>

                    {/* Sidebar Nav (Desktop only) */}
                    <aside className="hidden lg:flex flex-col h-full py-md w-64 fixed left-0 top-0 bg-surface-container-lowest border-r border-outline-variant pt-24 z-40">
                        <div className="px-6 mb-8">
                            <div className="flex items-center gap-3 py-2 border-b border-outline-variant/20 pb-4">
                                <div className="w-10 h-10 rounded-full bg-primary-container/20 border border-primary-fixed-dim flex items-center justify-center shadow-[0_0_15px_rgba(0,230,57,0.2)]">
                                    <span className="material-symbols-outlined text-primary-fixed-dim">analytics</span>
                                </div>
                                <div>
                                    <p className="font-label-caps text-xs text-primary-fixed-dim font-bold">ANALYST MODE</p>
                                    <p className="text-[10px] text-on-surface-variant">Premium Tier</p>
                                </div>
                            </div>
                        </div>
                        <nav className="flex-1 px-4 space-y-2">
                            {[
                                { name: "Dashboard", label: "Home", icon: "dashboard" },
                                { name: "Predictor", label: "Predictor", icon: "analytics" },
                                { name: "Simulator", label: "Bracket", icon: "account_tree" },
                                { name: "Insights", label: "Insights", icon: "query_stats" }
                            ].map(item => (
                                <button 
                                    key={item.name}
                                    onClick={() => setActiveTab(item.name)}
                                    className={`w-full flex items-center gap-4 px-4 py-3 rounded-md transition-all duration-200 text-left ${activeTab === item.name ? "bg-primary-container/10 text-primary border-r-4 border-primary-fixed-dim" : "text-on-surface-variant hover:bg-surface-variant/50 hover:text-primary"}`}

                                    <span className="material-symbols-outlined">{item.icon}</span>

                                </button>
                            ))}
                        </nav>
                        <div className="px-4 pt-6 mt-auto border-t border-outline-variant/30">
                            <button id="upgrade-data-btn" className="w-full py-3 bg-primary-fixed-dim text-background font-bold font-label-caps text-xs tracking-widest hover:brightness-110 active:scale-95 transition-all rounded shadow-[0_0_15px_rgba(0,230,57,0.3)]">
                                UPGRADE DATA
                            </button>
                            <div className="mt-4 space-y-1">
                                <a className="flex items-center gap-4 px-4 py-2 text-on-surface-variant hover:text-primary text-xs" href="#">
                                    <span className="material-symbols-outlined text-sm">help_outline</span>
                                    <span>Support</span>
                                </a>
                                <a className="flex items-center gap-4 px-4 py-2 text-on-surface-variant hover:text-primary text-xs" href="#">
                                    <span className="material-symbols-outlined text-sm">logout</span>
                                    <span>Logout</span>
                                </a>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content Layout Canvas */}

        // ==========================================
        // 2. FIXTURE PREDICTOR VIEW COMPONENT
        // ==========================================
        function PredictorView({ 
            teams, profiles, homeTeam, setHomeTeam, awayTeam, setAwayTeam, 
            searchH, setSearchH, searchA, setSearchA, showDropH, setShowDropH, 
            showDropA, setShowDropA, predictResult, loadingPredict, dataSource 
        }) {
            const [animate, setAnimate] = useState(false);
            const dropRefH = useRef(null);
            const dropRefA = useRef(null);

            useEffect(() => {
                setAnimate(false);
                const timer = setTimeout(() => setAnimate(true), 150);
                return () => clearTimeout(timer);
            }, [homeTeam, awayTeam, dataSource, loadingPredict]);

            // Handle clicking outside of dropdowns to close them
            useEffect(() => {
                const handleClickOutside = (e) => {
                    if (dropRefH.current && !dropRefH.current.contains(e.target)) {
                        setShowDropH(false);
                    }
                    if (dropRefA.current && !dropRefA.current.contains(e.target)) {
                        setShowDropA(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            const isDemo = dataSource === "Demo";

            // Predictor Data definitions
            const tH = isDemo ? MOCK_DATA.predictor.teamH : homeTeam;
            const tA = isDemo ? MOCK_DATA.predictor.teamA : awayTeam;
            const eloH = isDemo ? MOCK_DATA.predictor.eloH : Math.round(profiles[tH]?.elo || 1500);
            const eloA = isDemo ? MOCK_DATA.predictor.eloA : Math.round(profiles[tA]?.elo || 1500);
            const valH = isDemo ? MOCK_DATA.predictor.valH : (profiles[tH]?.tm_total_value || 0);
            const valA = isDemo ? MOCK_DATA.predictor.valA : (profiles[tA]?.tm_total_value || 0);
            const l5H = isDemo ? MOCK_DATA.predictor.l5H : ["W", "W", "D", "L", "W"]; // default form dots
            const l5A = isDemo ? MOCK_DATA.predictor.l5A : ["D", "W", "L", "D", "D"];

            // Model output values
            let probs = MOCK_DATA.predictor.probs;
            let heatmap = MOCK_DATA.predictor.heatmap;
            let comparison = {
                elo: { home: eloH, away: eloA, diff: eloH - eloA },
                form: { home: 88, away: 62, diff: 26 },
                value: { home: valH, away: valA, ratio: valH / Math.max(1, valA) },
                attack: { home: 2.8, away: 2.1, displayH: "2.8 xG/G", displayA: "2.1 xG/G" }
            };
            let takeText = MOCK_DATA.predictor.take;
            let factorsList = MOCK_DATA.predictor.factors;
            let modelLabel = "MODEL: GB-ULTRA-v4.2";

            if (!isDemo && predictResult) {
                probs = predictResult.probs;
                heatmap = predictResult.heatmap;
                modelLabel = "MODEL: POISSON-GOALS-v1.0";
                
                comparison.elo = {
                    home: predictResult.comparison.elo.home,
                    away: predictResult.comparison.elo.away,
                    diff: predictResult.comparison.elo.home - predictResult.comparison.elo.away
                };
                comparison.form = {
                    home: predictResult.comparison.form.home,
                    away: predictResult.comparison.form.away,
                    diff: predictResult.comparison.form.home - predictResult.comparison.form.away
                };
                comparison.value = {
                    home: predictResult.comparison.market_value.home,
                    away: predictResult.comparison.market_value.away,
                    ratio: predictResult.comparison.market_value.home / Math.max(1, predictResult.comparison.market_value.away)
                };
                comparison.attack = {
                    home: Math.round(predictResult.lambdas.home * 10) / 10,
                    away: Math.round(predictResult.lambdas.away * 10) / 10,
                    displayH: `${predictResult.lambdas.home.toFixed(1)} λ`,
                    displayA: `${predictResult.lambdas.away.toFixed(1)} λ`
                };

                // Dynamic analyst takes
                const leader = comparison.elo.diff > 0 ? tH : tA;
                takeText = `${leader} holds the statistical advantage in this fixture. The Poisson model expects an offensive density of ${comparison.attack.home} goals for ${tH} and ${comparison.attack.away} goals for ${tA}. `;
                if (comparison.value.ratio > 1.3) {
                    takeText += `Additionally, ${tH}'s squad is financially valued at ${comparison.value.ratio.toFixed(1)}x compared to ${tA}, presenting a strong depth and quality factor.`;
                } else if (comparison.value.ratio < 0.7) {
                    takeText += `However, ${tA}'s squad depth and valuation (${~~(valA/1e6)}M EUR) could provide tactical counter-weights.`;
                } else {
                    takeText += `With comparable squad valuations, this matchup turns into a tactical chess match.`;
                }

                factorsList = [
                    `${tH} average ELO rank matches pre-tournament coefficients.`,
                    `Poisson log-loss calibration predicts draw potential at ${probs.draw}%.`,
                    `Relative ELO rating difference is ${Math.abs(comparison.elo.diff)} points.`
                ];
            }

            const filterTeams = (query, currentSelected) => {
                return teams.filter(t => t.toLowerCase().includes(query.toLowerCase()) && t !== currentSelected);
            };

            return (
                <div className="max-w-[1100px] mx-auto px-6 py-8">
                    {/* Select Team Panel */}

                            <div className="flex flex-col items-center text-center gap-4">
                                <div className="w-24 h-24 rounded-full border border-outline-variant/30 flex items-center justify-center bg-surface-container overflow-hidden shadow-inner">
                                    <img className="w-16 h-16 object-contain" src={getFlagUrl(tH)} alt="" />
                                </div>

                                <div className="relative w-full" ref={dropRefH}>
                                    <button 
                                        id="home-team-select-btn"
                                        onClick={() => !isDemo && setShowDropH(!showDropH)} 
                                        disabled={isDemo}
                                        className={`font-display-md text-2xl text-on-surface font-bold italic tracking-tighter uppercase flex items-center justify-center gap-2 mx-auto ${isDemo ? 'cursor-default' : 'hover:text-primary-fixed-dim'}`}
                                    >
                                        {tH} {!isDemo && <span className="material-symbols-outlined text-sm">arrow_drop_down</span>}
                                    </button>

                                    {showDropH && (
                                        <div className="absolute left-1/2 -translate-x-1/2 mt-2 w-56 bg-surface border border-white/10 rounded-lg shadow-2xl z-50 p-2 text-left">
                                            <input 
                                                id="home-team-search"
                                                type="text" 
                                                value={searchH}
                                                onChange={e => setSearchH(e.target.value)}
                                                placeholder="Search home team..." 
                                                className="w-full p-2 bg-background border border-white/10 rounded text-xs mb-2 text-white focus:border-primary-fixed-dim focus:ring-0"
                                            />
                                            <div className="max-h-48 overflow-y-auto space-y-1 custom-scrollbar">
                                                {filterTeams(searchH, awayTeam).map(t => (
                                                    <button 
                                                        key={t}
                                                        onClick={() => {
                                                            setHomeTeam(t);
                                                            setShowDropH(false);
                                                            setSearchH("");
                                                        }}
                                                        className="w-full text-left p-2 hover:bg-primary-container/20 rounded text-xs uppercase"
                                                    >
                                                        {t}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <p className="font-label-caps text-xs text-on-surface-variant font-bold">
                                    ELO RATING: {eloH}
                                </p>

                                <div className="flex gap-1.5 mt-1">
                                    {l5H.map((r, i) => (
                                        <span 
                                            key={i} 
                                            className={`px-2 py-0.5 rounded-sm text-[10px] font-bold ${r === "W" ? "bg-primary-container/20 text-primary-fixed-dim" : r === "L" ? "bg-error-container/20 text-error" : "bg-surface-variant text-on-surface-variant"}`}
                                        >
                                            {r}
                                        </span>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* VS Indicator */}
                        <div className="md:col-span-1 flex flex-col items-center justify-center">
                            <div className="h-16 w-px bg-gradient-to-b from-transparent via-primary/30 to-transparent mb-2"></div>
                            <div className="font-display-lg text-4xl italic text-primary-fixed-dim drop-shadow-[0_0_15px_rgba(0,230,57,0.4)] font-extrabold">VS</div>
                            <div className="h-16 w-px bg-gradient-to-b from-primary/30 via-primary/30 to-transparent mt-2"></div>
                        </div>

                        {/* Away Team Card */}
                        <div className={`md:col-span-5 glass-card rounded-xl p-6 relative overflow-hidden group transition-all duration-300 ${tA ? "active-glow scale-[1.02]" : "border-white/10"}`}>
                            <div className="absolute top-0 left-0 p-3 font-label-caps text-xs text-on-surface-variant font-bold opacity-70">AWAY</div>
                            <div className="flex flex-col items-center text-center gap-4">
                                <div className="w-24 h-24 rounded-full border border-outline-variant/30 flex items-center justify-center bg-surface-container overflow-hidden shadow-inner">
                                    <img className="w-16 h-16 object-contain" src={getFlagUrl(tA)} alt="" />
                                </div>

                                <div className="relative w-full" ref={dropRefA}>
                                    <button 
                                        id="away-team-select-btn"
                                        onClick={() => !isDemo && setShowDropA(!showDropA)} 
                                        disabled={isDemo}
                                        className={`font-display-md text-2xl text-on-surface font-bold italic tracking-tighter uppercase flex items-center justify-center gap-2 mx-auto ${isDemo ? 'cursor-default' : 'hover:text-primary-fixed-dim'}`}
                                    >
                                        {tA} {!isDemo && <span className="material-symbols-outlined text-sm">arrow_drop_down</span>}
                                    </button>

                                    {showDropA && (
                                        <div className="absolute left-1/2 -translate-x-1/2 mt-2 w-56 bg-surface border border-white/10 rounded-lg shadow-2xl z-50 p-2 text-left">
                                            <input 
                                                id="away-team-search"
                                                type="text" 
                                                value={searchA}
                                                onChange={e => setSearchA(e.target.value)}
                                                placeholder="Search away team..." 
                                                className="w-full p-2 bg-background border border-white/10 rounded text-xs mb-2 text-white focus:border-primary-fixed-dim focus:ring-0"
                                            />
                                            <div className="max-h-48 overflow-y-auto space-y-1 custom-scrollbar">
                                                {filterTeams(searchA, homeTeam).map(t => (
                                                    <button 
                                                        key={t}
                                                        onClick={() => {
                                                            setAwayTeam(t);
                                                            setShowDropA(false);
                                                            setSearchA("");
                                                        }}
                                                        className="w-full text-left p-2 hover:bg-primary-container/20 rounded text-xs uppercase"
                                                    >
                                                        {t}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <p className="font-label-caps text-xs text-on-surface-variant font-bold">
                                    ELO RATING: {eloA}
                                </p>

                                <div className="flex gap-1.5 mt-1">
                                    {l5A.map((r, i) => (
